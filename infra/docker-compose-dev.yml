version: '3.8'

services:

  # ─── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: trivia-redis
    ports:
      - "6379:6379"
    networks:
      - trivia-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Commander — UI para inspecionar chaves ────────
  # Útil para debugar:
  #   room:{code}:state
  #   room:{code}:players
  #   room:{code}:round:{idx}:answers
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: trivia-redis-commander
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8091:8081"
    environment:
      REDIS_HOSTS: "local:redis:6379"
    networks:
      - trivia-net

  # ─── Question DB — Shard A ───────────────────────────────
  # Temas: history, science, geography, arts_and_literature, society_and_culture
  db-shard-a:
    image: postgres:15-alpine
    container_name: trivia-db-shard-a
    environment:
      POSTGRES_DB: ${DB_SHARD_A_NAME}
      POSTGRES_USER: ${DB_SHARD_A_USER}
      POSTGRES_PASSWORD: ${DB_SHARD_A_PASS}
    ports:
      - "5432:5432"
    volumes:
      - ./init/shard-a:/docker-entrypoint-initdb.d
      - db-shard-a-data:/var/lib/postgresql/data
    networks:
      - trivia-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_SHARD_A_USER} -d ${DB_SHARD_A_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Question DB — Shard B ───────────────────────────────
  # Temas: music, sport_and_leisure, film_and_tv, food_and_drink, general_knowledge
  db-shard-b:
    image: postgres:15-alpine
    container_name: trivia-db-shard-b
    environment:
      POSTGRES_DB: ${DB_SHARD_B_NAME}
      POSTGRES_USER: ${DB_SHARD_B_USER}
      POSTGRES_PASSWORD: ${DB_SHARD_B_PASS}
    ports:
      - "5433:5432"
    volumes:
      - ./init/shard-b:/docker-entrypoint-initdb.d
      - db-shard-b-data:/var/lib/postgresql/data
    networks:
      - trivia-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_SHARD_B_USER} -d ${DB_SHARD_B_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      

  # ─── User DB — Primário (escrita) ────────────────────────────────────────
  # Tabelas: users, user_stats, processed_games
  db-user-primary:
    image: postgres:15-alpine
    container_name: trivia-db-user-primary
    environment:
      POSTGRES_DB: ${DB_USERDB_NAME}
      POSTGRES_USER: ${DB_USERDB_USER}
      POSTGRES_PASSWORD: ${DB_USERDB_PASS}
    ports:
      - "5434:5432"
    volumes:
      - ./init/userdb:/docker-entrypoint-initdb.d
      - db-user-primary-data:/var/lib/postgresql/data
    networks:
      - trivia-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERDB_USER} -d ${DB_USERDB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  # ─── User DB — Réplica (leitura) ─────────────────────────────────────────
  # Em desenvolvimento local: instância independente com o mesmo schema.
  # Streaming replication real é configurada no deploy EC2.
  db-user-replica:
    image: postgres:15-alpine
    container_name: trivia-db-user-replica
    environment:
      POSTGRES_DB: ${DB_USERDB_NAME}
      POSTGRES_USER: ${DB_USERDB_USER}
      POSTGRES_PASSWORD: ${DB_USERDB_PASS}
    ports:
      - "5435:5432"
    volumes:
      - ./init/userdb:/docker-entrypoint-initdb.d
      - db-user-replica-data:/var/lib/postgresql/data
    networks:
      - trivia-net
    depends_on:
      db-user-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERDB_USER} -d ${DB_USERDB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ─── Zookeeper ───────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: trivia-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - trivia-net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka ───────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: trivia-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    networks:
      - trivia-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Kafka UI ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: trivia-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: trivia-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - trivia-net

networks:
  trivia-net:
    driver: bridge

volumes:
  db-shard-a-data:
  db-shard-b-data:
  db-user-primary-data:
  db-user-replica-data:

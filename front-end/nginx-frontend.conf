# front-end/nginx-frontend.conf
# Serve o bundle estático do Vite e garante que o React Router funcione
# (todas as rotas desconhecidas retornam index.html)

server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # ── Compressão ────────────────────────────────────────────────────────────
    gzip         on;
    gzip_static  on;   # serve .gz pré-comprimidos se existirem
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        image/svg+xml;

    # ── Assets estáticos com hash no nome (ex: main.a1b2c3.js) ───────────────
    # Vite inclui hash no filename → pode ser cacheado por 1 ano sem risco
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires           1y;
        add_header        Cache-Control "public, immutable";
        try_files         $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # Rotas do React Router (ex: /lobby, /game/42) não existem no filesystem.
    # Nginx serve index.html e o React Router assume o controle no browser.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

// Contrato gRPC — User Service
// Fonte: Contrato de Integração API Gateway §5.1 (versão 1.1)

syntax = "proto3";

package trivia.user.v1;

option java_package = "com.trivia.user.grpc";
option java_outer_classname = "UserServiceProto";

service UserService {
  rpc RegisterUser (RegisterUserRequest) returns (AuthResponse);
  rpc LoginUser    (LoginUserRequest)    returns (AuthResponse);
  rpc UpdateUser   (UpdateUserRequest)   returns (UpdateUserResponse);
  rpc GetUserStats (GetUserStatsRequest) returns (GetUserStatsResponse);
}

// ── Autenticação ──────────────────────────────────────────────────────────

message RegisterUserRequest {
  string name     = 1;
  string password = 2;
}

message LoginUserRequest {
  string name     = 1;
  string password = 2;
}

// Resposta comum a Register e Login.
message AuthResponse {
  string user_id = 1;
  string name    = 2;
}

// ── Perfil ────────────────────────────────────────────────────────────────

message UpdateUserRequest {
  string          user_id  = 1;
  optional string name     = 2;  
  optional string password = 3;
}

message UpdateUserResponse {
  bool success = 1;
}

// ── Estatísticas ──────────────────────────────────────────────────────────

message GetUserStatsRequest {
  string user_id = 1;
}

message GetUserStatsResponse {
  int32  games_played   = 1;
  double avg_position   = 2;
  double avg_points     = 3;
  int32  highest_score  = 4;
  int32  games_won      = 5;
}

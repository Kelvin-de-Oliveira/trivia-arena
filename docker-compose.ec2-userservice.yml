services:

  user-service:
    build:
      context: ./user-service
    container_name: trivia-user-service
    ports:
      - "9091:9091"   # gRPC — acessado pelo Gateway via IP privado
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat /dev/null > /dev/tcp/localhost/9090' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - trivia-net

networks:
  trivia-net:
    driver: bridge
